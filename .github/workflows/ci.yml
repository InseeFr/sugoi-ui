name: Sugoi UI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: yarn install --frozen-lockfile
      - run: yarn lint
  cypress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: yarn install --frozen-lockfile
      - run: yarn start & yarn wait-on http://localhost:3000
      - run: yarn cypress run
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist
  