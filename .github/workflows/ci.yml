name: Sugoi UI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
  cypress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm start & pnpm wait-on http://localhost:3000
      - run: pnpm cypress run
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist
  